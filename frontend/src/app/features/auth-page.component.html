<main class="auth-shell">
  <section class="auth-card">
    <div class="brand">
      <p class="chip">iTrav</p>
      <h1>Planeje viagens sem friccao.</h1>
      <p class="subtitle">Um fluxo simples para entrar e comecar seu roteiro.</p>
    </div>

    <div class="mode-switch">
      <button type="button" [class.active]="mode() === 'login'" (click)="switchMode('login')">Entrar</button>
      <button type="button" [class.active]="mode() === 'register'" (click)="switchMode('register')">Criar conta</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      @if (mode() === 'register') {
        <label>
          Nome
          <input type="text" formControlName="name" placeholder="Seu nome" />
        </label>
      }

      <label>
        Email
        <input type="email" formControlName="email" placeholder="voce@email.com" />
      </label>

      <label>
        Senha
        <input type="password" formControlName="password" placeholder="Minimo 6 caracteres" />
      </label>

      @if (mode() === 'register') {
        <label>
          Confirmar senha
          <input type="password" formControlName="confirmPassword" placeholder="Repita a senha" />
        </label>
      }

      @if (errorMessage()) {
        <p class="error">{{ errorMessage() }}</p>
      }

      <button class="primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Aguarde...' : (mode() === 'login' ? 'Entrar' : 'Criar conta') }}
      </button>
    </form>
  </section>
</main>
